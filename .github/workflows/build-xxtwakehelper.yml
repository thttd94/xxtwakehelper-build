name: Build XXTWakeHelper IPA

on:
  workflow_dispatch:
  push:
    paths:
      - 'XXTWakeHelper/**'
      - '.github/workflows/build-xxtwakehelper.yml'

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Theos
        run: |
          brew install ldid xz
          git clone --recursive https://github.com/theos/theos.git ~/theos
      - name: Build app
        run: |
          export THEOS=~/theos
          cd XXTWakeHelper
          chmod +x build_on_mac.sh package_ipa.sh
          ./build_on_mac.sh
          ./package_ipa.sh .theos/obj/debug/XXTWakeHelper.app
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: XXTWakeHelper-ipa
          path: XXTWakeHelper/XXTWakeHelper.ipa
