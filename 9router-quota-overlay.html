<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>9Router Live Quota Overlay</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: rgba(8, 10, 12, 0.58);
      --card: rgba(27, 31, 35, 0.86);
      --card2: rgba(36, 41, 46, 0.88);
      --text: #f4f7fa;
      --muted: #aab2bd;
      --dim: #737b86;
      --green: #00d26a;
      --yellow: #ffe04a;
      --red: #ff375f;
      --line: rgba(255,255,255,.08);
    }
    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Segoe UI, Arial, sans-serif;
      user-select: none;
    }
    body { padding: 10px; box-sizing: border-box; }
    #app {
      width: 500px;
      border-radius: 18px;
      background: var(--bg);
      backdrop-filter: blur(12px);
      box-shadow: 0 18px 60px rgba(0,0,0,.35), inset 0 0 0 1px var(--line);
      overflow: hidden;
    }
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 16px 10px;
      border-bottom: 1px solid var(--line);
    }
    .title { font-weight: 800; font-size: 16px; letter-spacing: .2px; color: var(--text); }
    .meta { font-size: 11px; color: var(--dim); display: flex; gap: 8px; align-items: center; }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 12px var(--green); }
    .dot.bad { background: var(--red); box-shadow: 0 0 12px var(--red); }
    #rows { padding: 10px; display: grid; gap: 8px; }
    .row {
      background: linear-gradient(180deg, var(--card2), var(--card));
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 10px 12px;
    }
    .head { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
    .name { color: var(--text); font-weight: 700; font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .plan { color: var(--dim); font-size: 10px; text-transform: uppercase; }
    .quota { display: grid; grid-template-columns: 62px 42px 1fr 74px; gap: 8px; align-items: center; margin-top: 6px; }
    .label { color: var(--muted); font-size: 11px; }
    .pct { font-size: 11px; font-weight: 800; text-align: right; }
    .reset { color: var(--muted); font-size: 10px; text-align: right; }
    .bar { height: 5px; border-radius: 999px; overflow: hidden; background: rgba(255,255,255,.12); }
    .fill { height: 100%; width: 0%; border-radius: 999px; transition: width .35s ease; }
    .empty, .error { padding: 22px 16px; color: var(--muted); font-size: 13px; text-align: center; }
    .error { color: var(--red); }
    .foot { padding: 0 16px 12px; color: var(--dim); font-size: 10px; display:flex; justify-content:space-between; }
  </style>
</head>
<body>
  <div id="app">
    <div class="top">
      <div class="title">9Router Live Quota</div>
      <div class="meta"><span id="dot" class="dot"></span><span id="status">starting</span></div>
    </div>
    <div id="rows"><div class="empty">Đang lấy dữ liệu...</div></div>
    <div class="foot"><span>poll API / 10s</span><span id="clock">--:--:--</span></div>
  </div>

<script>
const DB_API = 'http://127.0.0.1:20128/api/provider-connections';
const USAGE_API = id => `http://127.0.0.1:20128/api/usage/${encodeURIComponent(id)}`;
const REFRESH_MS = 10000;
const rowsEl = document.getElementById('rows');
const statusEl = document.getElementById('status');
const dotEl = document.getElementById('dot');
const clockEl = document.getElementById('clock');

function shortName(s) {
  s = s || 'unknown';
  if (s.includes('@')) {
    const [left, right] = s.split('@');
    return `${left.slice(0, 18)}${left.length > 18 ? '…' : ''}@${(right || '').split('.')[0].slice(0, 10)}`;
  }
  return s.length > 28 ? s.slice(0, 28) + '…' : s;
}
function pct(q) {
  if (!q) return 100;
  const total = q.total || 100;
  let rem = q.remaining;
  if (rem == null) rem = Math.max(0, total - (q.used || 0));
  return total ? Math.max(0, Math.min(100, Math.round(rem / total * 100))) : 100;
}
function color(p) { return p >= 70 ? 'var(--green)' : p >= 30 ? 'var(--yellow)' : 'var(--red)'; }
function inTime(reset) {
  if (!reset) return '-';
  const d = new Date(reset);
  if (Number.isNaN(d.getTime())) return '-';
  let mins = Math.max(0, Math.ceil((d.getTime() - Date.now()) / 60000));
  if (mins < 60) return `in ${mins}m`;
  let h = Math.floor(mins / 60);
  if (h < 24) return `in ${h}h`;
  let days = Math.floor(h / 24);
  return `in ${days}d`;
}
async function getJson(url) {
  const r = await fetch(url, { cache: 'no-store' });
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
  return await r.json();
}
async function loadConnections() {
  try {
    const data = await getJson(DB_API);
    const list = Array.isArray(data) ? data : (data.providerConnections || data.connections || []);
    return list.filter(a => a.provider === 'codex').sort((a,b) => (a.priority || 999) - (b.priority || 999)).slice(0, 8);
  } catch (e) {
    // 9Router currently may not expose provider-connections over HTTP. Fall back to local helper endpoint if added later.
    throw new Error('Không đọc được danh sách account từ API: ' + e.message);
  }
}
function quotaLine(label, q) {
  const p = pct(q);
  return `<div class="quota">
    <div class="label">${label}</div>
    <div class="pct" style="color:${color(p)}">${p}%</div>
    <div class="bar"><div class="fill" style="width:${p}%;background:${color(p)}"></div></div>
    <div class="reset">${inTime(q && q.resetAt)}</div>
  </div>`;
}
function render(items) {
  if (!items.length) { rowsEl.innerHTML = '<div class="empty">Không có account codex active.</div>'; return; }
  rowsEl.innerHTML = items.map(({a,u,err}) => {
    const qs = (u && u.quotas) || {};
    return `<div class="row">
      <div class="head"><div class="name">${shortName(a.email || a.name)}</div><div class="plan">${(u && u.plan) || a.providerSpecificData?.chatgptPlanType || ''}${err ? ' · lỗi' : ''}</div></div>
      ${err ? `<div class="error">${err}</div>` : `${quotaLine('Session', qs.session)}${quotaLine('Weekly', qs.weekly)}`}
    </div>`;
  }).join('');
}
async function refresh() {
  try {
    statusEl.textContent = 'updating';
    dotEl.classList.remove('bad');
    const accounts = await loadConnections();
    const items = await Promise.all(accounts.map(async a => {
      try { return { a, u: await getJson(USAGE_API(a.id)) }; }
      catch(e) { return { a, err: e.message }; }
    }));
    render(items);
    const t = new Date();
    statusEl.textContent = `live ${t.toLocaleTimeString()}`;
    clockEl.textContent = t.toLocaleTimeString();
  } catch (e) {
    dotEl.classList.add('bad');
    statusEl.textContent = 'error';
    rowsEl.innerHTML = `<div class="error">${e.message}</div>`;
  } finally {
    setTimeout(refresh, REFRESH_MS);
  }
}
refresh();
</script>
</body>
</html>
